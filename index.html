<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tab-header</title>
</head>
    <style>
        * {
            background-color: gray;
            margin: 0;
        }

        html {
            background-color: aliceblue;
        }

        body {
            background-color: rgb(148, 229, 231);

            display: flex;

            height: 100dvh;
            justify-content: space-between;
            align-items: center;
            flex-direction: column;
        }

        a {
            background-color: greenyellow;

            display: flex;

            height: 35dvh;
            width: 100dvw;
            justify-content: center;
            align-items: center;
            flex-direction: column;

            text-decoration: none;
            transition: transform 0.3s, box-shadow 0.3s; /* Анимация при наведении */
        }

        /* Эффекты при наведении */
        a:hover {
            transform: scale(1.1); /* Увеличение контейнера */
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.5); /* Легкая тень */
            border-radius: 0;
        }

        .top {
            border-radius: 0 0 150px 150px;
        }

        .bot {
            border-radius: 50px 50px 0 0;
        }

        h1, h5 {
            background-color: greenyellow;
        }
    </style>
<body>
    <a href="#" class="top">
        <h1>container 1</h1>
        <h5>весь контейнер кнопка</h5>
    </a>
    <a href="#" class="bot">
        <h1>container 2</h1>
        <h5>весь контейнер кнопка</h5>
    </a>
</body>
</html>
