<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nehtový Specialista</title>
    <style>
        * {
            margin: 0;
        }

        body {
            width: 100dvw;
            height: 100dvh;

            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
        }

        a {
            display: flex;
            justify-content: center;
            align-items: center;

            text-decoration: none;
            color: inherit;
        }

        .logo {
            width: 100%;
            height: 50%;

            z-index: 1;

            background-image: url(./static/image/logo-2560x1440p.webp);
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        .butts {
            width: 100%;
            height: 25%;

            border: 1px solid rgb(0, 0, 0);
            
            z-index: 2;
        }

        .top {
            border-radius: 0 0 40% 40%;

            background: radial-gradient(circle, #d9f9e2, #ad1515);
            box-shadow:
                inset 0px -10px 20px 3px rgb(0, 0, 0, 0.25),
                0 5px 10px 3px rgb(0, 0, 0, 0.5);
        }

        .bot {
            border-radius: 40% 40% 0 0;

            background: radial-gradient(circle, #d9f9e2, #1679e2);
            box-shadow: 
                inset 0px 10px 20px 3px rgb(0, 0, 0, 0.5),
                0 0 0 1px rgb(0, 0, 0, 0.75);
        }
        
        h2 {
            text-transform: uppercase;
        }

    </style>
</head>
<body>
    <a href="#" class="butts top">
        <h2>služby</h2>
    </a>
    <a href="#" class="logo"></a>
    <a href="#" class="butts bot">
        <h2>produkty</h2>
    </a>
</body>
</html>
