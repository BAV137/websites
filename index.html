<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nehtový Specialista</title>
    <style>
        html {
            background-color: rgb(100, 100, 100);
        }


        body {
            background-color: rgb(50, 150, 200);

            margin: 0;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
        }

        .container {
            background-color: rgb(0, 100, 150);

            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .butt {
            background-color: rgb(0, 50, 100);

            height: 30vh;
            width: 60%;
        }

        h1, h3 {
            margin: 0;
        }

    </style>
</head>
<body>
    <div class="container butt top">
        <h1>služby</h1>
    </div>

    <div class="container logo">
        <h1>Bystrová</h1>
        <h3>nehtový specialista</h3>
    </div>

    <div class="container butt bot">
        <h1>produkty</h1>
    </div>
</body>
</html>
