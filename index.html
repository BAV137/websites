<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nehty</title>
    <style>
        * {
            margin: 0;
        }

        body {
            width: 100dvw;
            height: 100dvh;

            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
        }

        a {
            display: flex;
            justify-content: center;
            align-items: center;

            text-decoration: none;
            color: inherit;
        }

        .logo {
            width: 100%;
            height: 50%;

            z-index: 1;

            background-image: url(./static/image/logo-2560x1440p.webp);
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        .butts {
            width: 100%;
            height: 25%;
            
            z-index: 2;
        }

        .top {
            background-color: rgb(180, 180, 237);
            border-radius: 0 0 40% 40%;
            box-shadow:
                inset 0px -10px 20px 2px rgb(0, 0, 0, 0.25),
                0 5px 10px 3px rgb(0, 0, 0, 0.5);
        }

        .bot {
            background-color: rgb(231, 190, 190);

            border-radius: 40% 40% 0 0;
            box-shadow: 
                inset 0px 10px 20px 5px rgb(0, 0, 0, 0.25);
            }

    </style>
</head>
<body>
    <a href="#" class="butts top">sluzby</a>
    <a href="#" class="logo"></a>
    <a href="#" class="butts bot">produkty</a>
</body>
</html>
